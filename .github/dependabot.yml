version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"

    open-pull-requests-limit: 5

    commit-message:
      prefix: "deps"

    groups:
      react:
        patterns:
          - "react*"
      tauri:
        patterns:
          - "@tauri-apps/*"
      tooling:
        patterns:
          - "vite"
          - "typescript"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"
